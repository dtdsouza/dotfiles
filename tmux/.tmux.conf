#remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | ans -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file
bind r source-file ~/.tmux.conf

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# enable mouse control (clickable windowns, panes, resizable panes)
set -g mouse on

# auto-rename windows to current directory basename
set-option -g allow-rename on
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# when manually renaming a window, lock the name against auto-rename
bind-key , command-prompt -I "#{window_name}" \
  "rename-window '%%'; set-window-option automatic-rename off; set-window-option allow-rename off"

# renumber windows when one is closed
set-option -g renumber-windows on

# start window and pane numbering from 1
set -g base-index 1
set -g pane-base-index 1

bind -T copy-mode    C-c send -X copy-pipe-no-clear "xsel -i --clipboard"
bind -T copy-mode-vi C-c send -X copy-pipe-no-clear "xsel -i --clipboard"

bind - split-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Everforest Dark theme
# bg0=#2d353b  bg1=#343f44  bg3=#475258
# fg=#d3c6aa   grey=#859289
# green=#a7c080  aqua=#83c092  yellow=#dbbc7f  red=#e67e80

# pane borders
set -g pane-border-style          "fg=#56635f"
set -g pane-active-border-style   "fg=#b8e06a"

# status bar
set -g status on
set -g status-position bottom
set -g status-style               "fg=#d3c6aa,bg=#2d353b"
set -g status-left-length 20
set -g status-right-length 40
set -g status-left  "#[fg=#2d353b,bg=#a7c080,bold] #S #[fg=#a7c080,bg=#2d353b,nobold]"
set -g status-right "#[fg=#343f44,bg=#2d353b]#[fg=#859289,bg=#343f44] %H:%M  %d %b "

# window tabs
set -g window-status-separator    ""
set -g window-status-format       "#[fg=#2d353b,bg=#343f44]#[fg=#859289,bg=#343f44]  #I  #W#{?window_bell_flag,#[fg=#e69875] ●,}  #[fg=#343f44,bg=#2d353b]"
set -g window-status-current-format "#[fg=#2d353b,bg=#a7c080]#[fg=#2d353b,bg=#a7c080,bold]  #I  #W  #[fg=#a7c080,bg=#2d353b,nobold]"

# agent / process notifications via terminal bell
set -g bell-action any
setw -g monitor-bell on
setw -g window-status-bell-style "fg=#859289,bg=#343f44"

# messages
set -g message-style              "fg=#dbbc7f,bg=#343f44"
set -g message-command-style      "fg=#dbbc7f,bg=#343f44"

# clock
set -g clock-mode-colour          "#a7c080"

